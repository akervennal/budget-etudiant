<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0c8f63">
  <title>Budget étudiant</title>
  <meta name="description" content="Sais en un coup d'œil combien tu peux vraiment dépenser aujourd'hui.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <!-- Polices (repli système si hors ligne) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">Budget</h1>
    <div class="header-right">
      <span class="header-date" id="headerDate"></span>
    </div>
  </header>

  <main>
    <section id="view-home" class="view active"></section>
    <section id="view-history" class="view"></section>
    <section id="view-recurring" class="view"></section>
    <section id="view-months" class="view"></section>
    <section id="view-settings" class="view"></section>
  </main>

  <nav class="tabbar">
    <button class="tab active" data-view="home">
      <svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1v-9.5z"/>
        <path d="M9 21V13h6v8"/>
      </svg>
      Accueil
    </button>
    <button class="tab" data-view="history">
      <svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
      Historique
    </button>
    <button class="tab" data-view="recurring">
      <svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 2l4 4-4 4"/>
        <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
        <path d="M7 22l-4-4 4-4"/>
        <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
      </svg>
      Récurrent
    </button>
    <button class="tab" data-view="months">
      <svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="17" rx="2"/>
        <line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
      </svg>
      Mois
    </button>
    <button class="tab" data-view="settings">
      <svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><circle cx="8" cy="6" r="2.5" fill="var(--bg)" stroke="currentColor" stroke-width="2"/>
        <line x1="3" y1="12" x2="21" y2="12"/><circle cx="16" cy="12" r="2.5" fill="var(--bg)" stroke="currentColor" stroke-width="2"/>
        <line x1="3" y1="18" x2="21" y2="18"/><circle cx="10" cy="18" r="2.5" fill="var(--bg)" stroke="currentColor" stroke-width="2"/>
      </svg>
      Réglages
    </button>
  </nav>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" id="modalRoot"></div>
  </div>

  <script>
    window.addEventListener("error", function(e) {
      var d = document.createElement("div");
      d.style = "position:fixed;top:60px;left:0;right:0;background:#c00;color:#fff;padding:12px;z-index:9999;font-size:13px;word-break:break-all";
      d.textContent = "ERREUR: " + e.message + " (" + (e.filename||"").split("/").pop() + ":" + e.lineno + ")";
      document.body.appendChild(d);
    });
  </script>
  <script src="format.js"></script>
  <script src="store.js"></script>
  <script src="app.js"></script>
</body>
</html>
